  header:            "&8&m--------------------"
  item-line:         "  &8▸ &e{amount}x &r{name} &8= &6{price} {currency}"
  footer:            "&8&m--------------------"
  total:             "&aTotal: &6{total} {currency} &adari &e{amount} item"
